data:
  # You can add more configuration fields here if you need more specific behavior.
  data_path: data/raw.csv
  train_start: 1990-01-01
  train_end: 2015-12-31
  val_start: 2016-03-01
  val_end: 2020-12-31
  test_start: 2021-03-01
  test_end: 2024-12-31
  market_cap: 10

model:
  backend: xgboost
  objective: rank:ndcg
  num_rounds: 100
  learning_rate: 0.1
  max_depth: 5
  subsample: 0.6
  colsample_bytree: 0.6
  random_state: 1234
  label_encoder: "decile"
  eval_at: [10, 20, 30]


pipeline:
  plots_dir: generated/plots
  rebuild_dataset: false

ensemble:
  enabled: true
  combination: mean_score   # "mean_rank" (Borda count) or "mean_score"
  weights: [0.6, 0.2, 0.2] # ret_1m, ret_3m, ret_6m — null for equal weights
