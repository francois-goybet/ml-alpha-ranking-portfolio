data:
  # You can add more configuration fields here if you need more specific behavior.
  data_path: data/raw.csv
  train_start: 1990-01-01
  train_end: 2015-12-31
  val_start: 2016-03-01
  val_end: 2020-12-31
  test_start: 2021-03-01
  test_end: 2024-12-31
  market_cap: 10
  return_lags: []  # lagged monthly return features to add as predictors
  target_aggregation: mean  # null | "mean" | "median" — replace targets with mean/median over the horizon window

# model:
#   backend: xgboost
#   targets: [ret_1m, ret_3m, ret_6m]
#   label_encoder: long_ranker
#   objective: rank:ndcg
#   num_rounds: 100
#   learning_rate: 0.1
#   max_depth: 5
#   subsample: 0.6
#   colsample_bytree: 0.6
#   random_state: 1234
#   eval_at: [10, 20, 30]
#   verbosity: 1
model:
  backend: tabular
  # --- TabularRanker (cross-sectional attention) ---
  d_model: 32          # token embedding dimension (must be divisible by n_heads)
  n_heads: 4           # attention heads (d_model / n_heads = 8 dims per head)
  n_layers: 2          # stacked cross-sectional attention blocks
  hidden_dim: 64       # width of each parallel horizon branch
  dropout: 0.1
  alpha: 0.3           # BCE weight for branch-1 (ret_1m)
  beta_aux: 0.2        # BCE weight for branch-2 (ret_3m)
  gamma: 0.1           # BCE weight for branch-3 (ret_6m)
  delta: 1.0           # ranking loss weight
  margin_weight: 0.0   # STOSA margin regularizer weight (0 = disabled for now)
  margin: 1.0
  ranking_loss: ndcg
  ndcg_tau: 1.0
  lr: 3e-4
  weight_decay: 1e-5
  num_rounds: 50
  batch_groups: 16
  device: mps
  label_encoder: long_ranker

pipeline:
  plots_dir: generated/plots
  rebuild_dataset: false
  verbose: false          # show boosting round logs during training

feature_pipeline:
  cross_sectional_rank: False   # rank-normalise each feature within each month to [0, 1]
  winsorize: null        # clip at 1st/99th percentile per month
  impute: zero               # fill NaNs with per-feature train median
  scale: null                 # no global scaling (CS rank already normalises)
  drop_low_variance: 0.0       # drop constant features
  pca: null                    # no PCA
  centroid_feature: False       # add L2 distance to monthly centroid as a feature
  ridge_features:
    targets: [ret_1m, ret_3m, ret_6m]
    alpha: 10000000000000          # Ridge regularisation strength
  # autoencoder:
  #   hidden_dims: [32, 16, 8]
  #   variational: true
  #   beta: 1.0          # or e.g. 4.0 for beta-VAE
  #   epochs: 50
  #   batch_size: 512
  #   lr: 1e-3
  #   weight_decay: 1e-5
  #   dropout: 0.1
  #   replace_features: False      # true → keep only latent cols; false → append
  #   device: "mps"                # "mps" for Apple Silicon

ensemble:
  enabled: true
  combination: mean_rank   # "mean_rank" (Borda count) or "mean_score"
  weights: [0.4, 0.3, 0.3] # ret_1m, ret_3m, ret_6m — null for equal weights
